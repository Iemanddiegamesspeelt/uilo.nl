<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eigen Speurtocht Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        #map { 
            height: 450px; 
            width: 100%; 
            border-radius: 1rem; 
            z-index: 1;
        }
        .found { background-color: #d1fae5 !important; border-color: #10b981 !important; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .crosshair-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            pointer-events: none;
            color: #ef4444;
            display: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <!-- Invoermenu -->
    <div id="inputModal" class="modal">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full mx-4">
            <h3 class="text-xl font-bold mb-4">Nieuwe plek toevoegen</h3>
            <input type="text" id="locationNameInput" placeholder="Naam van de plek..." 
                   class="w-full border-2 border-gray-200 rounded-lg p-3 mb-4 focus:border-blue-500 outline-none">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-2 text-gray-500 font-bold">Annuleren</button>
                <button onclick="confirmAddLocation()" class="flex-1 py-2 bg-blue-600 text-white rounded-lg font-bold">Opslaan</button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Mijn Eigen Speurtocht</h1>
            <p class="text-gray-600 mb-4 text-lg">Klik op de kaart of gebruik de knop om locaties toe te voegen.</p>
            
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 inline-block">
                <div class="flex items-center gap-4">
                    <div class="w-48 bg-gray-200 rounded-full h-3 overflow-hidden">
                        <div id="progressBar" class="bg-green-500 h-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                    <span id="progressText" class="text-sm font-bold text-gray-700 font-mono">0 gevonden</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-4">
                <div class="relative bg-white p-2 rounded-2xl shadow-lg border border-gray-100">
                    <div id="map"></div>
                    <!-- Hulpmiddel (Vizier) -->
                    <div id="crosshair" class="crosshair-overlay">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </div>
                </div>
                
                <div class="flex flex-wrap gap-2 justify-center">
                    <button onclick="openModalWithCenter()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-all flex items-center gap-2 transform active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        Zet marker in het midden
                    </button>
                    <button onclick="toggleCrosshair()" id="crossBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-6 rounded-xl transition-all">
                        Hulpmiddel aan/uit
                    </button>
                </div>
            </div>

            <div class="space-y-4">
                <h2 class="text-xl font-semibold text-gray-700 px-2">Jouw Plekken</h2>
                <div id="locationsList" class="space-y-3 max-h-[500px] overflow-y-auto pr-2"></div>
                <div id="emptyState" class="text-center py-10 border-2 border-dashed border-gray-300 rounded-xl">
                    <p class="text-gray-400 text-sm">Nog geen plekken toegevoegd.</p>
                </div>
                <button onclick="resetAll()" class="w-full py-2 text-sm text-red-400 hover:text-red-600 transition-colors">
                    Alles wissen
                </button>
            </div>
        </div>
    </div>

    <script>
        let locations = [];
        let map;
        let markers = {};
        let pendingCoords = null;

        // localStorage functies voor betrouwbare opslag op eigen domein
        function saveData() {
            localStorage.setItem('speurtocht_data_v2', JSON.stringify(locations));
            render();
        }

        function loadData() {
            const saved = localStorage.getItem('speurtocht_data_v2');
            if (saved) {
                try {
                    locations = JSON.parse(saved);
                } catch(e) {
                    console.error("Fout bij laden data:", e);
                    locations = [];
                }
            }
        }

        function initMap() {
            map = L.map('map', {
                tap: false,
                clickTolerance: 15
            }).setView([51.968, 4.615], 14);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CARTO'
            }).addTo(map);

            map.on('click', function(e) {
                openModal(e.latlng.lat, e.latlng.lng);
            });
        }

        function toggleCrosshair() {
            const ch = document.getElementById('crosshair');
            const btn = document.getElementById('crossBtn');
            if (ch.style.display === 'block') {
                ch.style.display = 'none';
                btn.classList.remove('bg-gray-400');
                btn.classList.add('bg-gray-200');
            } else {
                ch.style.display = 'block';
                btn.classList.remove('bg-gray-200');
                btn.classList.add('bg-gray-400');
            }
        }

        function openModal(lat, lng) {
            pendingCoords = { lat, lng };
            const modal = document.getElementById('inputModal');
            const input = document.getElementById('locationNameInput');
            input.value = '';
            modal.classList.add('active');
            setTimeout(() => input.focus(), 100);
        }

        function openModalWithCenter() {
            const center = map.getCenter();
            openModal(center.lat, center.lng);
        }

        function closeModal() {
            document.getElementById('inputModal').classList.remove('active');
            pendingCoords = null;
        }

        function confirmAddLocation() {
            const name = document.getElementById('locationNameInput').value;
            if (name && name.trim() !== "" && pendingCoords) {
                const newLoc = {
                    id: Date.now(),
                    name: name.trim(),
                    lat: pendingCoords.lat,
                    lng: pendingCoords.lng,
                    found: false
                };
                locations.push(newLoc);
                saveData();
                closeModal();
            }
        }

        document.getElementById('locationNameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') confirmAddLocation();
        });

        function toggleFound(id) {
            const loc = locations.find(l => l.id === id);
            if (loc) {
                loc.found = !loc.found;
                saveData();
            }
        }

        function deleteLocation(id) {
            if (confirm("Dit plakje verwijderen?")) {
                locations = locations.filter(l => l.id !== id);
                saveData();
            }
        }

        function resetAll() {
            if (confirm("Alle opgeslagen locaties wissen?")) {
                locations = [];
                saveData();
            }
        }

        function render() {
            const list = document.getElementById('locationsList');
            const emptyState = document.getElementById('emptyState');
            list.innerHTML = '';
            
            Object.values(markers).forEach(m => map.removeLayer(m));
            markers = {};

            locations.length === 0 ? emptyState.classList.remove('hidden') : emptyState.classList.add('hidden');

            let foundCount = 0;
            locations.forEach(loc => {
                if (loc.found) foundCount++;

                const marker = L.marker([loc.lat, loc.lng]).addTo(map);
                
                const popupContent = document.createElement('div');
                popupContent.className = 'text-center p-1';
                popupContent.innerHTML = `
                    <div class="font-bold mb-2">${loc.name}</div>
                    <button class="bg-blue-500 text-white px-3 py-1 rounded-full text-xs font-bold">Wissel status</button>
                `;
                popupContent.querySelector('button').onclick = () => {
                    toggleFound(loc.id);
                    map.closePopup();
                };

                marker.bindPopup(popupContent);
                
                if (marker.getElement()) {
                    marker.getElement().style.filter = loc.found ? 'hue-rotate(120deg) brightness(0.8)' : 'none';
                }
                markers[loc.id] = marker;

                const card = document.createElement('div');
                card.className = `p-3 border-2 rounded-xl flex items-center justify-between cursor-pointer bg-white transition-all shadow-sm ${loc.found ? 'found border-green-500' : 'border-gray-100 hover:border-blue-200'}`;
                card.onclick = () => {
                    map.flyTo([loc.lat, loc.lng], 16);
                    setTimeout(() => marker.openPopup(), 400);
                };
                card.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div onclick="event.stopPropagation(); toggleFound(${loc.id})" class="min-w-[24px] h-6 rounded-full border-2 flex items-center justify-center ${loc.found ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300'}">
                            ${loc.found ? '✓' : ''}
                        </div>
                        <span class="truncate font-semibold text-sm ${loc.found ? 'text-green-800' : 'text-gray-700'}">${loc.name}</span>
                    </div>
                    <button onclick="event.stopPropagation(); deleteLocation(${loc.id})" class="text-gray-300 hover:text-red-500 p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                    </button>
                `;
                list.appendChild(card);
            });

            document.getElementById('progressBar').style.width = (locations.length > 0 ? (foundCount / locations.length) * 100 : 0) + '%';
            document.getElementById('progressText').innerText = `${foundCount} / ${locations.length} gevonden`;
        }

        window.onload = () => {
            loadData();
            initMap();
            render();
            setTimeout(() => map.invalidateSize(), 500);
        };
    </script>
</body>
</html>
