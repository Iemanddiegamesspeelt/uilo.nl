<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
            user-select: none;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 1.8rem;
            color: #eee;
        }

        .clock-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock {
            width: 200px;
            height: 120px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
        }

        .clock.white {
            background: linear-gradient(145deg, #f0f0f0, #d0d0d0);
            color: #333;
            border: 3px solid #999;
        }

        .clock.black {
            background: linear-gradient(145deg, #333, #222);
            color: #fff;
            border: 3px solid #555;
        }

        .clock.active {
            border-color: #4CAF50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }

        .clock.paused {
            opacity: 0.6;
        }

        .clock.time-out {
            background: #ff4444 !important;
            color: #fff !important;
            animation: pulse 0.5s infinite;
        }

        .clock-label {
            font-size: 1rem;
            margin-bottom: 5px;
            font-weight: normal;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .setup-info {
            font-size: 1.3rem;
            color: #4CAF50;
            margin-bottom: 20px;
            min-height: 35px;
            text-align: center;
        }

        .setup-info .digit-label {
            color: #ff9800;
            font-weight: bold;
        }

        .setup-info .clock-label {
            color: #2196F3;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
            min-width: 100px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-up {
            background: linear-gradient(145deg, #4CAF50, #45a049);
            color: white;
        }

        .btn-down {
            background: linear-gradient(145deg, #f44336, #da190b);
            color: white;
        }

        .btn-next {
            background: linear-gradient(145deg, #2196F3, #1976D2);
            color: white;
        }

        .btn-pause {
            background: linear-gradient(145deg, #ff9800, #f57c00);
            color: white;
        }

        .btn-pause.holding {
            background: linear-gradient(145deg, #e91e63, #c2185b);
        }

        .progress-bar {
            margin-top: 25px;
            width: 100%;
            max-width: 420px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #4CAF50;
            transition: width 0.3s ease;
        }

        .instructions {
            margin-top: 25px;
            max-width: 500px;
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .instructions h3 {
            color: #ccc;
            margin-bottom: 10px;
        }

        .mode-display {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
        }

        .mode-display span {
            display: inline-block;
            padding: 3px 10px;
            margin: 2px;
            border-radius: 4px;
            background: #2a2a4a;
        }

        .mode-display span.current {
            background: #4CAF50;
            color: white;
        }

        .mode-display span.done {
            background: #666;
            color: #ccc;
        }
    </style>
</head>
<body>
    <h1>Chess Clock</h1>

    <div class="setup-info" id="setupInfo">Set White Hours</div>

    <div class="clock-container">
        <div class="clock white active" id="whiteClock">
            <span class="clock-label">White</span>
            <span id="whiteTime">00:00:00</span>
        </div>
        <div class="clock black" id="blackClock">
            <span class="clock-label">Black</span>
            <span id="blackTime">00:00:00</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-up" id="btnUp">Up</button>
        <button class="btn btn-down" id="btnDown">Down</button>
        <button class="btn btn-next" id="btnNext">Next</button>
        <button class="btn btn-pause" id="btnPause">Start</button>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>

    <div class="mode-display" id="modeDisplay"></div>

    <div class="instructions">
        <h3>How to set up</h3>
        <p>
            1. Use <strong>Up/Down</strong> to change the current value<br>
            2. Press <strong>Next</strong> to move to the next setting<br>
            3. When done, press <strong>Start</strong> to begin<br>
            4. <strong>Hold Start</strong> anytime to reset to setup mode
        </p>
    </div>

    <script>
        // Setup modes
        const modes = [
            { id: 'white-hours', label: 'White Hours', max: 9, target: 'white', field: 'hours' },
            { id: 'white-mins', label: 'White Minutes', max: 59, target: 'white', field: 'mins' },
            { id: 'white-secs', label: 'White Seconds', max: 59, target: 'white', field: 'secs' },
            { id: 'black-hours', label: 'Black Hours', max: 9, target: 'black', field: 'hours' },
            { id: 'black-mins', label: 'Black Minutes', max: 59, target: 'black', field: 'mins' },
            { id: 'black-secs', label: 'Black Seconds', max: 59, target: 'black', field: 'secs' },
            { id: 'bonus', label: 'Bonus (sec/move)', max: 59, field: 'bonus' },
            { id: 'delay', label: 'Delay (sec)', max: 59, field: 'delay' },
        ];

        // State
        let currentMode = 0;
        let isPlaying = false;
        let isPaused = false;
        let activePlayer = 'white';
        let timerInterval = null;
        let holdTimer = null;
        let holdStartTime = 0;

        // Time values
        let settings = {
            white: { hours: 0, mins: 5, secs: 0 },
            black: { hours: 0, mins: 5, secs: 0 },
            bonus: 0,
            delay: 0
        };

        // Running time in seconds
        let whiteTime = 0;
        let blackTime = 0;
        let delayCounter = 0;

        // DOM elements
        const whiteDisplay = document.getElementById('whiteTime');
        const blackDisplay = document.getElementById('blackTime');
        const whiteClockEl = document.getElementById('whiteClock');
        const blackClockEl = document.getElementById('blackClock');
        const setupInfo = document.getElementById('setupInfo');
        const progressFill = document.getElementById('progressFill');
        const modeDisplay = document.getElementById('modeDisplay');
        const btnPause = document.getElementById('btnPause');

        function formatTime(totalSeconds) {
            if (totalSeconds < 0) totalSeconds = 0;
            const hours = Math.floor(totalSeconds / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = Math.floor(totalSeconds % 60);
            return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function getSettingValue(mode) {
            const m = modes[mode];
            if (m.field === 'bonus') return settings.bonus;
            if (m.field === 'delay') return settings.delay;
            return settings[m.target][m.field];
        }

        function setSettingValue(mode, value) {
            const m = modes[mode];
            if (m.field === 'bonus') settings.bonus = value;
            else if (m.field === 'delay') settings.delay = value;
            else settings[m.target][m.field] = value;
        }

        function updateDisplay() {
            if (!isPlaying) {
                // Show settings
                whiteDisplay.textContent = formatTime(settings.white.hours * 3600 + settings.white.mins * 60 + settings.white.secs);
                blackDisplay.textContent = formatTime(settings.black.hours * 3600 + settings.black.mins * 60 + settings.black.secs);
            } else {
                whiteDisplay.textContent = formatTime(whiteTime);
                blackDisplay.textContent = formatTime(blackTime);
            }
        }

        function updateSetupInfo() {
            if (isPlaying) {
                if (isPaused) {
                    setupInfo.innerHTML = 'Paused';
                } else {
                    setupInfo.innerHTML = `<span class="clock-label">${activePlayer.charAt(0).toUpperCase() + activePlayer.slice(1)}</span>'s turn`;
                }
                return;
            }

            const m = modes[currentMode];
            const value = getSettingValue(currentMode);
            setupInfo.innerHTML = `Set <span class="digit-label">${m.label}</span>: <strong>${value}</strong>`;

            // Update clock highlighting
            const targetingWhite = m.target === 'white' || !m.target;
            whiteClockEl.classList.toggle('active', targetingWhite && m.target !== 'black');
            blackClockEl.classList.toggle('active', m.target === 'black');
        }

        function updateProgressBar() {
            const progress = ((currentMode + 1) / modes.length) * 100;
            progressFill.style.width = `${progress}%`;
        }

        function updateModeDisplay() {
            let html = '';
            modes.forEach((m, i) => {
                let cls = i === currentMode && !isPlaying ? 'current' : (i < currentMode || isPlaying ? 'done' : '');
                html += `<span class="${cls}">${m.label.split(' ').slice(-1)[0]}</span>`;
            });
            modeDisplay.innerHTML = html;
        }

        function adjustTime(delta) {
            if (isPlaying) return;

            const m = modes[currentMode];
            let value = getSettingValue(currentMode);
            value = Math.max(0, Math.min(m.max, value + delta));
            setSettingValue(currentMode, value);

            updateSetupInfo();
            updateDisplay();
        }

        function nextMode() {
            if (isPlaying) return;

            currentMode++;
            if (currentMode >= modes.length) {
                currentMode = modes.length - 1;
            }

            updateSetupInfo();
            updateProgressBar();
            updateModeDisplay();
        }

        function startGame() {
            if (isPlaying && !isPaused) return;

            if (isPlaying && isPaused) {
                // Resume
                isPaused = false;
                timerInterval = setInterval(tick, 100);
                btnPause.textContent = 'Pause';
                updateSetupInfo();
                return;
            }

            // Start game
            isPlaying = true;
            isPaused = false;
            activePlayer = 'white';

            // Convert settings to seconds
            whiteTime = settings.white.hours * 3600 + settings.white.mins * 60 + settings.white.secs;
            blackTime = settings.black.hours * 3600 + settings.black.mins * 60 + settings.black.secs;
            delayCounter = settings.delay;

            whiteClockEl.classList.remove('time-out');
            blackClockEl.classList.remove('time-out');
            whiteClockEl.classList.add('active');
            blackClockEl.classList.remove('active');

            timerInterval = setInterval(tick, 100);
            btnPause.textContent = 'Pause';
            progressFill.style.width = '100%';
            updateSetupInfo();
            updateDisplay();
        }

        function pauseGame() {
            if (!isPlaying || isPaused) return;

            isPaused = true;
            clearInterval(timerInterval);
            timerInterval = null;
            btnPause.textContent = 'Resume';
            updateSetupInfo();
        }

        function togglePause() {
            if (isPlaying) {
                if (isPaused) {
                    startGame(); // Resume
                } else {
                    pauseGame();
                }
            } else {
                startGame();
            }
        }

        function tick() {
            if (isPaused) return;

            // Handle delay
            if (delayCounter > 0) {
                delayCounter -= 0.1;
                return;
            }

            // Decrement active player's time
            if (activePlayer === 'white') {
                whiteTime -= 0.1;
            } else {
                blackTime -= 0.1;
            }

            updateDisplay();

            // Check for time out
            if (whiteTime <= 0) {
                whiteClockEl.classList.add('time-out');
                stopClock();
                setupInfo.innerHTML = 'Black wins on time!';
            } else if (blackTime <= 0) {
                blackClockEl.classList.add('time-out');
                stopClock();
                setupInfo.innerHTML = 'White wins on time!';
            }
        }

        function stopClock() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function switchPlayer() {
            if (!isPlaying || isPaused) return;

            // Add bonus to player who just moved
            if (settings.bonus > 0) {
                if (activePlayer === 'white') {
                    whiteTime += settings.bonus;
                } else {
                    blackTime += settings.bonus;
                }
            }

            // Switch
            activePlayer = activePlayer === 'white' ? 'black' : 'white';
            delayCounter = settings.delay;

            whiteClockEl.classList.toggle('active', activePlayer === 'white');
            blackClockEl.classList.toggle('active', activePlayer === 'black');

            updateSetupInfo();
            updateDisplay();
        }

        function resetToSetup() {
            stopClock();
            isPlaying = false;
            isPaused = false;
            currentMode = 0;

            // Reset settings to default
            settings = {
                white: { hours: 0, mins: 5, secs: 0 },
                black: { hours: 0, mins: 5, secs: 0 },
                bonus: 0,
                delay: 0
            };

            whiteClockEl.classList.remove('time-out');
            blackClockEl.classList.remove('time-out');
            whiteClockEl.classList.add('active');
            blackClockEl.classList.remove('active');

            btnPause.textContent = 'Start';
            btnPause.classList.remove('holding');

            updateDisplay();
            updateSetupInfo();
            updateProgressBar();
            updateModeDisplay();
        }

        // Hold to reset
        let holdTimeout = null;

        function startHold() {
            holdStartTime = Date.now();
            btnPause.classList.add('holding');

            holdTimeout = setTimeout(() => {
                resetToSetup();
            }, 1500); // 1.5 second hold
        }

        function endHold() {
            if (holdTimeout) {
                clearTimeout(holdTimeout);
                holdTimeout = null;
            }

            const held = Date.now() - holdStartTime;
            btnPause.classList.remove('holding');

            if (held < 1500) {
                togglePause();
            }
        }

        // Button events
        document.getElementById('btnUp').addEventListener('click', () => {
            if (!isPlaying) adjustTime(1);
        });

        document.getElementById('btnDown').addEventListener('click', () => {
            if (!isPlaying) adjustTime(-1);
        });

        document.getElementById('btnNext').addEventListener('click', () => {
            if (!isPlaying) {
                nextMode();
            } else {
                switchPlayer();
            }
        });

        document.getElementById('btnPause').addEventListener('mousedown', startHold);
        document.getElementById('btnPause').addEventListener('mouseup', endHold);
        document.getElementById('btnPause').addEventListener('mouseleave', () => {
            if (holdTimeout) {
                clearTimeout(holdTimeout);
                holdTimeout = null;
                btnPause.classList.remove('holding');
            }
        });

        // Touch events for mobile
        document.getElementById('btnPause').addEventListener('touchstart', (e) => {
            e.preventDefault();
            startHold();
        });
        document.getElementById('btnPause').addEventListener('touchend', (e) => {
            e.preventDefault();
            endHold();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    adjustTime(1);
                    break;
                case 'ArrowDown':
                    adjustTime(-1);
                    break;
                case 'ArrowRight':
                case ' ':
                    e.preventDefault();
                    if (isPlaying) {
                        switchPlayer();
                    } else {
                        nextMode();
                    }
                    break;
                case 'Enter':
                    togglePause();
                    break;
                case 'Escape':
                case 'r':
                case 'R':
                    if (isPlaying) {
                        resetToSetup();
                    }
                    break;
            }
        });

        // Click on clock to switch during play
        whiteClockEl.addEventListener('click', () => {
            if (isPlaying && activePlayer === 'white' && !isPaused) {
                switchPlayer();
            }
        });

        blackClockEl.addEventListener('click', () => {
            if (isPlaying && activePlayer === 'black' && !isPaused) {
                switchPlayer();
            }
        });

        // Initialize
        updateDisplay();
        updateSetupInfo();
        updateProgressBar();
        updateModeDisplay();
    </script>
</body>
</html>
